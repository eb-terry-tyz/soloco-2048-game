<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  :root {
    --bg: #faf8ef;
    --board-bg: #bbada0;
    --cell-bg: #cdc1b4;
    --text-dark: #776e65;
    --text-light: #f9f6f2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text-dark);
    font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 12px;
  }
  .game {
    width: 100%;
    max-width: 440px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  h1 { font-size: 56px; font-weight: 800; }
  .panel { display: flex; align-items: center; gap: 10px; }
  .score-box {
    background: var(--board-bg);
    color: var(--text-light);
    border-radius: 6px;
    padding: 8px 16px;
    text-align: center;
    min-width: 90px;
  }
  .score-box .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #eee4da;
  }
  .score-box .value { font-size: 24px; font-weight: 800; }
  .btn {
    background: #8f7a66;
    color: var(--text-light);
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:hover { background: #9f8b77; }
  .subtitle { margin-bottom: 14px; color: #776e65; line-height: 1.4; }
  .subtitle strong { color: #6b6359; }
  .board-wrap { position: relative; }
  .board {
    background: var(--board-bg);
    border-radius: 8px;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 12px;
    aspect-ratio: 1 / 1;
  }
  .cell {
    background: var(--cell-bg);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: clamp(20px, 8vw, 36px);
    color: var(--text-dark);
    user-select: none;
  }
  .tile-2    { background: #eee4da; }
  .tile-4    { background: #ede0c8; }
  .tile-8    { background: #f2b179; color: var(--text-light); }
  .tile-16   { background: #f59563; color: var(--text-light); }
  .tile-32   { background: #f67c5f; color: var(--text-light); }
  .tile-64   { background: #f65e3b; color: var(--text-light); }
  .tile-128  { background: #edcf72; color: var(--text-light); font-size: clamp(18px,7vw,30px); }
  .tile-256  { background: #edcc61; color: var(--text-light); font-size: clamp(18px,7vw,30px); }
  .tile-512  { background: #edc850; color: var(--text-light); font-size: clamp(18px,7vw,30px); }
  .tile-1024 { background: #edc53f; color: var(--text-light); font-size: clamp(15px,5.5vw,24px); }
  .tile-2048 { background: #edc22e; color: var(--text-light); font-size: clamp(15px,5.5vw,24px); }
  .tile-super{ background: #3c3a32; color: var(--text-light); font-size: clamp(14px,5vw,22px); }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(238, 228, 218, 0.73);
    border-radius: 8px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }
  .overlay.show { display: flex; }
  .overlay .msg { font-size: 44px; font-weight: 800; color: #776e65; }
  .overlay.win .msg { color: #f9f6f2; }
  .overlay.win { background: rgba(237, 194, 46, 0.5); }
  .overlay .actions { display: flex; gap: 10px; }
  .hint { margin-top: 14px; color: #8f8579; font-size: 13px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="game">
    <div class="header">
      <h1>2048</h1>
      <div class="panel">
        <div class="score-box">
          <div class="label">分数</div>
          <div class="value" id="score">0</div>
        </div>
        <button class="btn" id="newGame">New Game</button>
      </div>
    </div>
    <p class="subtitle">用 <strong>方向键</strong> 滑动方块，相同数字相撞即合并。目标：拼出 <strong>2048</strong>！</p>
    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="overlay" id="overlay">
        <div class="msg" id="overlayMsg"></div>
        <div class="actions" id="overlayActions"></div>
      </div>
    </div>
    <p class="hint">移动：← ↑ ↓ → ｜ 合并得分累加 ｜ 每步随机生成新方块（90% 为 2，10% 为 4）</p>
  </div>

<script>
(function () {
  "use strict";
  var SIZE = 4;

  // ---- pure logic (mirrors logic-export.js) ----
  function moveLeft(board) {
    var points = 0;
    var newBoard = board.map(function (row) {
      var filtered = row.filter(function (v) { return v !== 0; });
      var merged = [];
      for (var i = 0; i < filtered.length; i++) {
        if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
          var sum = filtered[i] * 2;
          merged.push(sum);
          points += sum;
          i++;
        } else {
          merged.push(filtered[i]);
        }
      }
      while (merged.length < row.length) merged.push(0);
      return merged;
    });
    return { board: newBoard, points: points };
  }
  function rotateCW(board) {
    var n = board.length;
    var out = board.map(function (row) { return row.slice(); });
    for (var r = 0; r < n; r++) {
      for (var c = 0; c < n; c++) out[c][n - 1 - r] = board[r][c];
    }
    return out;
  }
  function rotateCCW(board) {
    var n = board.length;
    var out = board.map(function (row) { return row.slice(); });
    for (var r = 0; r < n; r++) {
      for (var c = 0; c < n; c++) out[n - 1 - c][r] = board[r][c];
    }
    return out;
  }
  function boardsEqual(a, b) {
    for (var r = 0; r < a.length; r++)
      for (var c = 0; c < a[r].length; c++)
        if (a[r][c] !== b[r][c]) return false;
    return true;
  }
  function canMove(board) {
    var rotated = board.map(function (row) { return row.slice(); });
    for (var i = 0; i < 4; i++) {
      if (!boardsEqual(moveLeft(rotated).board, rotated)) return true;
      rotated = rotateCW(rotated);
    }
    return false;
  }
  function hasWon(board) {
    for (var r = 0; r < board.length; r++)
      for (var c = 0; c < board[r].length; c++)
        if (board[r][c] >= 2048) return true;
    return false;
  }

  // Apply a directional move by rotating into "left" orientation and back.
  function move(board, dir) {
    var b = board.map(function (row) { return row.slice(); });
    var res;
    if (dir === "left") {
      res = moveLeft(b);
    } else if (dir === "right") {
      res = moveLeft(rotateCW(rotateCW(b)));
      res.board = rotateCW(rotateCW(res.board));
    } else if (dir === "up") {
      res = moveLeft(rotateCCW(b));
      res.board = rotateCW(res.board);
    } else if (dir === "down") {
      res = moveLeft(rotateCW(b));
      res.board = rotateCCW(res.board);
    }
    return res;
  }

  // ---- game state ----
  var board, score, won, keepGoing;

  function emptyBoard() {
    var b = [];
    for (var r = 0; r < SIZE; r++) { b.push([0, 0, 0, 0]); }
    return b;
  }
  function emptyCells(b) {
    var cells = [];
    for (var r = 0; r < SIZE; r++)
      for (var c = 0; c < SIZE; c++)
        if (b[r][c] === 0) cells.push([r, c]);
    return cells;
  }
  function spawn(b) {
    var cells = emptyCells(b);
    if (!cells.length) return;
    var pick = cells[Math.floor(Math.random() * cells.length)];
    b[pick[0]][pick[1]] = Math.random() < 0.9 ? 2 : 4;
  }

  function init() {
    board = emptyBoard();
    score = 0;
    won = false;
    keepGoing = false;
    spawn(board);
    spawn(board);
    hideOverlay();
    render();
  }

  // ---- rendering ----
  var boardEl = document.getElementById("board");
  var scoreEl = document.getElementById("score");
  var overlayEl = document.getElementById("overlay");
  var overlayMsgEl = document.getElementById("overlayMsg");
  var overlayActionsEl = document.getElementById("overlayActions");

  function clearChildren(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function render() {
    clearChildren(boardEl);
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        var v = board[r][c];
        var cell = document.createElement("div");
        cell.className = "cell";
        if (v !== 0) {
          cell.textContent = v;
          cell.classList.add(v <= 2048 ? "tile-" + v : "tile-super");
        }
        boardEl.appendChild(cell);
      }
    }
    scoreEl.textContent = score;
  }

  function showOverlay(message, isWin, actions) {
    overlayMsgEl.textContent = message;
    overlayEl.classList.toggle("win", !!isWin);
    overlayEl.classList.add("show");
    clearChildren(overlayActionsEl);
    actions.forEach(function (a) {
      var btn = document.createElement("button");
      btn.className = "btn";
      btn.textContent = a.label;
      btn.addEventListener("click", a.onClick);
      overlayActionsEl.appendChild(btn);
    });
  }
  function hideOverlay() {
    overlayEl.classList.remove("show", "win");
  }

  function handleMove(dir) {
    var res = move(board, dir);
    if (boardsEqual(res.board, board)) return; // illegal move, no change
    board = res.board;
    score += res.points;
    spawn(board);
    render();

    if (!won && !keepGoing && hasWon(board)) {
      won = true;
      showOverlay("你赢了！", true, [
        { label: "继续游戏", onClick: function () { keepGoing = true; hideOverlay(); } },
        { label: "New Game", onClick: init }
      ]);
      return;
    }
    if (!canMove(board)) {
      showOverlay("Game Over", false, [
        { label: "重新开始", onClick: init }
      ]);
    }
  }

  var KEYS = {
    ArrowLeft: "left", ArrowRight: "right",
    ArrowUp: "up", ArrowDown: "down"
  };
  document.addEventListener("keydown", function (e) {
    var dir = KEYS[e.key];
    if (!dir) return;
    if (overlayEl.classList.contains("show") && !won) return; // blocked on game over
    e.preventDefault();
    handleMove(dir);
  });

  document.getElementById("newGame").addEventListener("click", init);

  init();
})();
</script>
</body>
</html>
